METHOD:
  NAME: ClipAdapters
  FAMILY: adapter

CLIP_ADAPTERS:
  PREC: amp
  TYPE: MP
  INIT: BAYES_ADAPTER
  CONSTRAINT: none
  ENHANCED_BASE: none

  N_SAMPLES: 3
  N_TEST_SAMPLES: 10

  ALLOW_CACHE: true

  # for original BayesAdapter initialization
  BAYES_PRIOR_STD: 0.01

  # multiplier on top of the original 1/(1000*C*D) factor
  BAYES_KL_SCALE: 1.0

  # kept for compatibility, but BayesAdapter train path will use bayes_kl_weight
  KL_WEIGHT: 0.0001