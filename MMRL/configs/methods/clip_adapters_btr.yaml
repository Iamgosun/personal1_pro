CLIP_ADAPTERS:
  INIT: BTR

  # MC samples
  N_SAMPLES: 3
  N_TEST_SAMPLES: 10

  # Bayesian TaskRes:
  #   W = T + alpha * gate * R
  BTR_ALPHA: 0.5

  # Residual posterior:
  #   q(R) = N(mu_R, sigma_c^2 I)
  BTR_PRIOR_STD: 0.01
  BTR_INIT_STD: 0.01

  # KL weight
  BTR_BETA: 0.00005
  BAYES_KL_SCALE: 1.0

  # Data term:
  #   pp_nll = posterior predictive NLL
  #   mc_ce  = sample-wise MC CE
  BTR_DATA_TERM: pp_nll

  # Optional Brier regularization
  BTR_BRIER_WEIGHT: 0.0

  # Evidence gate:
  #   gate = n_c / (n_c + lambda)
  BTR_USE_EVIDENCE_GATE: False
  BTR_GATE_LAMBDA: 0.0
  BTR_GATE_MIN: 0.0
  BTR_GATE_MAX: 1.0

  # Support residual initialization:
  #   R_init = (class_mean - text) / alpha
  BTR_SUPPORT_INIT: True
  BTR_INIT_STRENGTH: 1.0
  BTR_INIT_MAX_NORM: 0.0

  # Strict TaskRes/BayesAdapter does not adapt image features
  BTR_USE_VISUAL_ADAPTER: False

  # Temperature calibration
  BTR_TEMPERATURE: 1.0
  BTR_TEMPERATURE_ON_TRAIN: False

  # Eval/train posterior predictive behavior
  BTR_POSTERIOR_PREDICTIVE_ON_TRAIN: False


  CACHE_REPS: 20
  CACHE_TRAIN_AUG: true
  CACHE_AGGREGATION: pool
  CACHE_POOL_EPOCH_SUBSAMPLE: true