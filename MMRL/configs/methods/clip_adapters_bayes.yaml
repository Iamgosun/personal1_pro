METHOD:
  NAME: ClipAdapters
  FAMILY: adapter
  TAG: BAYES_ADAPTER

CLIP_ADAPTERS:
  PREC: amp
  TYPE: MP
  INIT: BAYES_ADAPTER
  CONSTRAINT: none
  ENHANCED_BASE: none
  ALLOW_CACHE: true

  # stochastic prototype sampling
  N_SAMPLES: 3
  N_TEST_SAMPLES: 10

  # BayesAdapter prior / KL
  BAYES_PRIOR_STD: 0.01
  BAYES_KL_SCALE: 1.0
  KL_WEIGHT: 0.0001

  # cache executor
  CACHE_REPS: 20
  CACHE_TRAIN_AUG: true
  CACHE_AGGREGATION: pool
  CACHE_POOL_EPOCH_SUBSAMPLE: true

  
  # not used by BayesAdapter, but safe to keep false
  GRID_SEARCH: false
  GRID_SEARCH_SPLIT: val