METHOD:
  NAME: ClipAdapters
  FAMILY: adapter
  TAG: DREAM_BAYES_ADAPTER

CLIP_ADAPTERS:
  PREC: amp
  TYPE: MP
  INIT: DREAM_BAYES_ADAPTER
  CONSTRAINT: none
  ENHANCED_BASE: none
  ALLOW_CACHE: true

  # BayesAdapter posterior sampling.
  # Strict paper setting: use 128 at test time.
  # For quick debugging you may override N_TEST_SAMPLES from CLI.
  N_SAMPLES: 3
  N_TEST_SAMPLES: 10
  BAYES_PRIOR_STD: 0.01
  BAYES_KL_SCALE: 1.0
  KL_WEIGHT: 0.0001

  # Cache executor / support feature pool.
  CACHE_REPS: 20
  CACHE_TRAIN_AUG: true
  CACHE_AGGREGATION: pool
  CACHE_POOL_EPOCH_SUBSAMPLE: true

  # DREAM-BayesAdapter v4.1 strict switch.
  DREAM_ENABLED: true
  DREAM_V41_ENABLED: true

  # Text-anchored spherical tangent density ratio.
  DREAM_V41_RANK: 32
  DREAM_V41_CHUNK_CLASSES: 64
  DREAM_V41_ALPHA_T: 0.5
  DREAM_V41_DELTA: 0.00001

  # Numerical constants.
  DREAM_V41_EPS_THETA: 0.000001
  DREAM_V41_EPS_P: 0.000000000001
  DREAM_V41_EPS_SIGMA: 0.00001
  DREAM_V41_EPS_D: 0.000001

  # Text/support priors and shrinkage.
  DREAM_V41_NU_C: 4.0
  DREAM_V41_NU_MU: 4.0
  DREAM_V41_NU_SIGMA: 16.0
  DREAM_V41_RHO0: 0.1
  DREAM_V41_RHO_MIN: 0.1
  DREAM_V41_GAMMA_C: 2.0
  DREAM_V41_GAMMA_Q: 4.0

  # Top-M bounded residual.
  # -1 means: K when K <= 50, otherwise 50.
  DREAM_V41_TOP_M: -1
  DREAM_V41_RESIDUAL_CLIP: 1.5

  # DREAM-SS: lambda0 < 0 means support-selected from the grid.
  # For DREAM-Fixed, set DREAM_V41_LAMBDA: 0.25.
  DREAM_V41_LAMBDA: -1.0
  DREAM_V41_LAMBDA_GRID: [0.0, 0.25, 0.5]

  # Core method: T=1. Set a different value only for DREAM-Cal.
  DREAM_V41_TEMPERATURE: 1.0

  # Keep BayesAdapter training unchanged.
  DREAM_V41_DENSITY_ON_TRAIN: false
  DREAM_V41_POSTERIOR_BASE_ON_TRAIN: false
  DREAM_V41_TEMPERATURE_ON_TRAIN: false

  # Main v4.1 path uses shared U^T Log_m(z).
  # Set true only for A10 per-class projection ablation.
  DREAM_V41_USE_PER_CLASS_BASIS: false

  # Decoupled evidence: no g*p + (1-g)/K probability mixture.
  DREAM_APPLY_GATE: false
  DREAM_GATE_STRENGTH: 0.0
  DREAM_V41_GATE_A: 5.0
  DREAM_V41_GATE_QUANTILE: 0.1
  DREAM_V41_GATE_MIN_SUPPORT: 20

  DREAM_V41_DEBUG: true
  GRID_SEARCH: false
  GRID_SEARCH_SPLIT: val
