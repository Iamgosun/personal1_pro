METHOD:
  NAME: ClipAdapters
  FAMILY: adapter
  TAG: DREAM_BAYES_ADAPTER

CLIP_ADAPTERS:
  PREC: amp
  TYPE: MP
  INIT: DREAM_BAYES_ADAPTER
  CONSTRAINT: none
  ENHANCED_BASE: none
  ALLOW_CACHE: true

  # stochastic prototype sampling inherited from BayesAdapter
  N_SAMPLES: 3
  N_TEST_SAMPLES: 10

  # BayesAdapter prior / KL
  BAYES_PRIOR_STD: 0.01
  BAYES_KL_SCALE: 1.0
  KL_WEIGHT: 0.0001

  # cache executor / online support prefit
  CACHE_REPS: 20
  CACHE_TRAIN_AUG: true
  CACHE_AGGREGATION: pool
  CACHE_POOL_EPOCH_SUBSAMPLE: true

  # DREAM density-ratio evidence head
  DREAM_ENABLED: true
  DREAM_RANK: 32
  DREAM_CHUNK_CLASSES: 64
  DREAM_EPS: 0.0001
  DREAM_TEXT_PRIOR_STRENGTH: 4.0
  DREAM_MEAN_PRIOR_STRENGTH: 4.0
  DREAM_COV_PRIOR_STRENGTH: 16.0

  # -1 means choose lambda on support LOO-style NLL using the grid below.
  # Set to 0.0 to force density product fallback to BayesAdapter.
  DREAM_LAMBDA: -1.0
  DREAM_LAMBDA_GRID: [0.0, 0.1, 0.25, 0.5, 1.0]
  DREAM_LAMBDA_BETA: 0.01
  DREAM_USE_LOO: true
  DREAM_DENSITY_CLIP: 3.0

  # Orthogonal residual penalty catches OOD drift outside the low-rank semantic subspace.
  # Set 0.0 for ablation if you want pure density-ratio formulas.
  DREAM_ORTHOGONAL_GAMMA: 0.05

  # Default keeps BayesAdapter training unchanged; DREAM acts at eval/inference.
  DREAM_DENSITY_ON_TRAIN: false
  DREAM_APPLY_GATE: false

  # If true, lambda=0 also disables the gate, preserving strict fallback behavior.
  DREAM_GATE_REQUIRES_POSITIVE_LAMBDA: true

  # rho-strength gate:
  #   1.0 -> p_final = g*p_cls + (1-g)/K
  #   0.0 -> exact no-op
  DREAM_GATE_STRENGTH: 0.1
  DREAM_GATE_ON_TRAIN: false
  DREAM_GATE_A: 2.0
  DREAM_GATE_QUANTILE: 0.01

  DREAM_DEBUG: true

  GRID_SEARCH: false
  GRID_SEARCH_SPLIT: val
