METHOD:
  NAME: ClipAdapters
  FAMILY: adapter
  TAG: DREAM_BAYES_ADAPTER_V3

CLIP_ADAPTERS:
  PREC: amp
  TYPE: MP
  INIT: DREAM_BAYES_ADAPTER
  CONSTRAINT: none
  ENHANCED_BASE: none
  ALLOW_CACHE: true

  # BayesAdapter posterior sampling.
  N_SAMPLES: 3
  N_TEST_SAMPLES: 10
  BAYES_PRIOR_STD: 0.01
  BAYES_KL_SCALE: 1.0
  KL_WEIGHT: 0.0001

  # Cache executor / support feature pool.
  CACHE_REPS: 20
  CACHE_TRAIN_AUG: true
  CACHE_AGGREGATION: pool
  CACHE_POOL_EPOCH_SUBSAMPLE: true

  # DREAM-BayesAdapter v3 strict switch.
  DREAM_ENABLED: true
  DREAM_V3_ENABLED: true

  # Low-rank text-anchored spherical density ratio.
  DREAM_V3_RANK: 32
  DREAM_V3_CHUNK_CLASSES: 64
  DREAM_V3_ALPHA_V: 1.0
  DREAM_V3_ALPHA_T: 0.5
  DREAM_V3_DELTA: 0.00001

  # Numerical constants.
  DREAM_V3_EPS_THETA: 0.000001
  DREAM_V3_EPS_P: 0.000000000001
  DREAM_V3_EPS_SIGMA: 0.00001
  DREAM_V3_EPS_D: 0.000001
  DREAM_V3_EPS_R: 0.000001

  # Text/support priors and shrinkage.
  DREAM_V3_NU_C: 4.0
  DREAM_V3_NU_MU: 4.0
  DREAM_V3_NU_SIGMA: 16.0
  DREAM_V3_RHO0: 0.05
  DREAM_V3_RHO_MIN: 0.05
  DREAM_V3_GAMMA_C: 2.0
  DREAM_V3_GAMMA_Q: 4.0

  # Bounded residual clip: [-c_minus, c_plus].
  DREAM_V3_C_MINUS: 1.5
  DREAM_V3_C_PLUS: 2.0

  # lambda0 < 0 means support-only selection from the grid.
  # The grid includes 0.0 for exact BayesAdapter fallback.
  DREAM_V3_LAMBDA: -1.0
  DREAM_V3_LAMBDA_GRID: [0.0, 0.25, 0.5]
  DREAM_V3_LAMBDA_BETA: 0.01
  DREAM_V3_LAMBDA_MARGIN: 0.0

  # Core method: T=1. Set a different value only for DREAM-Cal.
  DREAM_V3_TEMPERATURE: 1.0

  # Keep BayesAdapter training unchanged.
  DREAM_V3_DENSITY_ON_TRAIN: false
  DREAM_V3_POSTERIOR_BASE_ON_TRAIN: false
  DREAM_V3_TEMPERATURE_ON_TRAIN: false

  # Evidence is decoupled: no g*p+(1-g)/K probability mixture.
  DREAM_APPLY_GATE: false
  DREAM_GATE_STRENGTH: 0.0
  DREAM_V3_GATE_A: 5.0

  # Large K*N background scale sampling cap for memory safety.
  DREAM_V3_MAX_ALL_PAIRS: 262144

  DREAM_V3_DEBUG: true
  GRID_SEARCH: false
  GRID_SEARCH_SPLIT: val
