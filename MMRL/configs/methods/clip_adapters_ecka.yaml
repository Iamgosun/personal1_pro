METHOD:
  NAME: ClipAdapters
  FAMILY: adapter
  EXEC_MODE: cache
  TAG: ECKA_SAFE

CLIP_ADAPTERS:
  PREC: fp32
  INIT: ECKA
  TYPE: MP
  CONSTRAINT: none
  ENHANCED_BASE: none
  ALLOW_CACHE: True

  CACHE_REPS: 1
  CACHE_TRAIN_AUG: True
  CACHE_AGGREGATION: pool
  CACHE_POOL_EPOCH_SUBSAMPLE: True

  GRID_SEARCH: False

  ECKA_USE_GDA: True
  ECKA_USE_KERNEL: True
  ECKA_USE_FUSION_GRID: True

  ECKA_KAPPA0: 2.0
  ECKA_COV_SHRINK: 0.95
  ECKA_KERNEL_LAMBDA: -1.0
  ECKA_KERNEL_BETA_SCALE: 1.0

  ECKA_REPLACE_ZS: False
  ECKA_RESIDUAL_ALPHA: 0.5
  ECKA_MIN_W0: 0.6

  ECKA_CALIBRATE: False
  ECKA_RANGE_DELTA: -1.0
  ECKA_UNCERTAINTY_BETA: 0.0

OPTIM:
  MAX_EPOCH: 1
  LR: 0.0