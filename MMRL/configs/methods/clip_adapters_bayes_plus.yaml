METHOD:
  NAME: ClipAdapters
  FAMILY: adapter
  TAG: BAYES_ADAPTER_PLUS

CLIP_ADAPTERS:
  PREC: amp
  TYPE: MP
  INIT: BAYES_ADAPTER_PLUS
  CONSTRAINT: none
  ENHANCED_BASE: none
  ALLOW_CACHE: true

  # Start conservative.
  # After ACC recovers, increase N_SAMPLES to 3.
  N_SAMPLES: 1
  N_TEST_SAMPLES: 10

  # Base Bayes prior / KL.
  BAYES_PRIOR_STD: 0.01
  BAYES_PLUS_POSTERIOR_INIT_STD: 0.01
  BAYES_KL_SCALE: 1.0
  KL_WEIGHT: 0.0001

  # Start with no low-rank noise.
  # After baseline is stable, try 4 or 8.
  BAYES_PLUS_RANK: 0
  BAYES_PLUS_LOW_RANK_INIT_STD: 0.0001
  BAYES_PLUS_LOW_RANK_SCALE: 0.003
  BAYES_PLUS_LOW_RANK_KL_SCALE: 0.0001

  # Conservative empirical-Bayes prior.
  # Important: effective reps should match CACHE_REPS.
  BAYES_PLUS_EFFECTIVE_REPS: 20
  BAYES_PLUS_EB_TAU: 16.0
  BAYES_PLUS_EB_ALPHA_MAX: 0.35
  BAYES_PLUS_EB_VAR_A: 0.0001
  BAYES_PLUS_EB_VAR_B: 0.05
  BAYES_PLUS_PRIOR_MIN_STD: 0.003
  BAYES_PLUS_PRIOR_MAX_STD: 0.03

  # Keep original BayesAdapter-like posterior initialization.
  BAYES_PLUS_SHIFT_POSTERIOR_MEAN_TO_EB: false
  BAYES_PLUS_SHIFT_POSTERIOR_STD_TO_EB: false

  # Posterior predictive behavior.
  BAYES_PLUS_TRAIN_PREDICTIVE_LOGPROB: false

  # Mahalanobis OOD branch.
  BAYES_PLUS_MAHA_SHRINKAGE: 0.50
  BAYES_PLUS_MAHA_EPS: 0.0001

  # Fixed validation-free OOD score weights.
  BAYES_PLUS_OOD_W_MAXPROB: 0.35
  BAYES_PLUS_OOD_W_ENTROPY: 0.20
  BAYES_PLUS_OOD_W_MAHA: 0.30
  BAYES_PLUS_OOD_W_ENERGY: 0.15

  # Cache executor.
  CACHE_REPS: 20
  CACHE_TRAIN_AUG: true
  CACHE_AGGREGATION: pool
  CACHE_POOL_EPOCH_SUBSAMPLE: true

  GRID_SEARCH: false
  GRID_SEARCH_SPLIT: val