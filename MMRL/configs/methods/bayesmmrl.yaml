METHOD:
  NAME: "BayesMMRL"
  FAMILY: internal_adaptation
  EXEC_MODE: online


BAYES_MMRL:
  PREC: amp
  ALPHA: 0.7
  REG_WEIGHT: 0.5
  N_REP_TOKENS: 5
  REP_LAYERS: [6, 7, 8, 9, 10, 11, 12]
  REP_DIM: 512
  N_MC_TRAIN: 3
  N_MC_TEST: 10
  KL_WEIGHT: 5e-4
  PRIOR_STD: 0.05
  POSTERIOR_RHO_INIT: -3.9

  SIGMA_MODE: "per_token"      # 或 "per_token"
  EVAL_MODE: "mc_only"      # 或 "mean_only" / "mean_plus_mc"