METHOD:
  NAME: "BayesMMRL"
  FAMILY: internal_adaptation
  EXEC_MODE: online

BAYES_MMRL:
  PREC: amp
  ALPHA: 0.7
  REG_WEIGHT: 0.5

  N_REP_TOKENS: 5
  REP_LAYERS: [6, 7, 8, 9, 10, 11, 12]
  REP_DIM: 512

  BAYES_TARGET: "rep_tokens"   # rep_tokens | proj_rep

  N_MC_TRAIN: 3
  N_MC_TEST: 10
  EVAL_MODE: "mc_predictive"   # posterior_mean | mc_predictive | mean_plus_mc
  EVAL_USE_POSTERIOR_MEAN: False

  # ----- Scheme A / B: Bayes on R -----
  REP_SIGMA_MODE: "global"  # global | per_token | per_dim | full
  REP_PRIOR_MODE: "zero"       # zero | clip_text | clip_joint
  REP_PRIOR_STD: 0.05
  REP_INIT_MODE: "normal"      # normal | prior_mean | prior_mean_noise
  REP_INIT_STD: 0.02
  REP_POSTERIOR_RHO_INIT: -3.9
  REP_KL_WEIGHT: 5e-4

  # used only when REP_PRIOR_MODE is clip_text / clip_joint
  CLIP_PRIOR_SCALE: 0.05
  CLIP_PRIOR_BLEND: 0.5

  # ----- Scheme C: Bayes on P_v^r -----
  PROJ_REP_SIGMA_MODE: "row"   # global | row | col | full
  PROJ_REP_PRIOR_STD: 0.01
  PROJ_REP_INIT_MODE: "pretrained_mean"  # normal | pretrained_mean | pretrained_mean_noise
  PROJ_REP_INIT_STD: 0.0
  PROJ_REP_POSTERIOR_RHO_INIT: -5.5
  PROJ_REP_KL_WEIGHT: 1e-6