METHOD:
  NAME: ClipAdapters
  FAMILY: adapter
  TAG: SBEA_ARD

CLIP_ADAPTERS:
  PREC: amp
  TYPE: MP
  INIT: SBEA
  CONSTRAINT: none
  ENHANCED_BASE: none
  ALLOW_CACHE: true

  # MC sampling
  N_SAMPLES: 3
  N_TEST_SAMPLES: 10

  # Sparse Bayesian residual posterior
  SBEA_POSTERIOR_INIT_STD: 0.005
  SBEA_MIN_STD: 0.000001

  # ARD prior
  SBEA_PRIOR_MODE: ard
  SBEA_PRIOR_STD: 0.05
  SBEA_ARD_LEARN_PRIOR: true
  SBEA_ARD_HYPER_WEIGHT: 0.0001
  SBEA_ARD_HYPER_SCALE: 1.0

  # KL
  SBEA_KL_WEIGHT: 0.0001
  BAYES_KL_SCALE: 1.0
  KL_WEIGHT: 0.0001

  # Output mode
  SBEA_TRAIN_RETURN: mc_predictive
  SBEA_EVAL_RETURN: mc_predictive

  # Optional feature residual adapter
  SBEA_USE_FEATURE_ADAPTER: false
  SBEA_ADAPTER_BOTTLENECK_RATIO: 0.25
  SBEA_ADAPTER_DIM: 0
  SBEA_FEATURE_SCALE_INIT: 0.1

  # Optional residual anchor
  SBEA_PROTO_ANCHOR_WEIGHT: 0.0

  # Energy/OOD statistics
  SBEA_ENERGY_TEMPERATURE: 1.0
  SBEA_EPS: 0.000000000001

  # Cache, consistent with latest DEBA config
  CACHE_REPS: 20
  CACHE_TRAIN_AUG: true
  CACHE_AGGREGATION: pool
  CACHE_POOL_EPOCH_SUBSAMPLE: true

  GRID_SEARCH: false
  GRID_SEARCH_SPLIT: val